name: Deploy to CT 5301

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, ct5301]
    timeout-minutes: 15

    steps:
      - name: Deploy
        run: |
          set -e
          cd ~/projects/smartify-plus
          git pull origin main
          docker compose build --no-cache frontend
          docker compose up -d frontend
          echo "✅ Deploy complete — $(docker compose ps frontend --format '{{.Status}}')"
