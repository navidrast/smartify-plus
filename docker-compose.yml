# Smartify Plus — Phase One Docker Compose
# Services: backend (FastAPI) + frontend (Next.js)
# Phase Zero Streamlit app (port 8501) can run separately if needed
#
# Usage:
#   docker compose up --build   # first run
#   docker compose up           # subsequent runs
#   docker compose down         # stop

services:

  # ─── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartify-backend
    ports:
      - "8000:8000"
    environment:
      - QWEN_API_BASE=${QWEN_API_BASE:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      - QWEN_VISION_MODEL=${QWEN_VISION_MODEL:-qwen-vl-max}
      - QWEN_TEXT_MODEL=${QWEN_TEXT_MODEL:-qwen-plus}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./smartify.db
      - DEMO_USER_ID=demo-user-001
      - ABR_GUID=${ABR_GUID:-}
    volumes:
      - smartify_db:/app/smartify.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartify-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  smartify_db:
    name: smartify_db
