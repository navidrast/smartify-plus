# Smartify Plus — Docker Compose (Qwen Cloud API mode)
# Single service: app (Streamlit UI) — no local Ollama required
#
# Requires a .env file with:
#   OLLAMA_API_BASE=https://dashscope.aliyuncs.com/compatible-mode/v1
#   OLLAMA_MODEL=qwen-vl-max
#   OLLAMA_API_KEY=sk-...
#
# Usage:
#   docker compose up --build        # first run (builds app image)
#   docker compose up                # subsequent runs
#   docker compose down              # stop

services:

  # ─── Streamlit application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartify-app
    ports:
      - "8501:8501"         # Open http://localhost:8501 in browser
    environment:
      # Cloud API (Qwen DashScope — OpenAI-compatible)
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen-vl-max}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    restart: unless-stopped
