# Smartify Plus Phase Zero — Docker Compose
# Two services: ollama (vision model server) + app (Streamlit UI)
#
# First run: Ollama will download qwen2.5-vl:7b-instruct (~5 GB) — allow 5–10 min
# Subsequent runs: model is cached in the `smartify_ollama_models` volume — starts in seconds
#
# Usage:
#   docker-compose up --build        # first run (builds app image + pulls model)
#   docker-compose up                # subsequent runs
#   docker-compose down              # stop (preserves model volume)
#   docker-compose down -v           # stop + delete model cache (forces re-download)

services:

  # ─── Ollama vision model server ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: smartify-ollama
    ports:
      - "11434:11434"       # Expose for direct curl testing if needed
    volumes:
      # Persist downloaded models across container recreations
      - smartify_ollama_models:/root/.ollama
    # Custom entrypoint:
    #   1. Start ollama serve in background
    #   2. Poll until the API is ready (avoids race condition)
    #   3. Pull the vision model (no-op if already cached in volume)
    #   4. Keep container alive via `wait`
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       SERVE_PID=$$!
       echo '[smartify] Waiting for Ollama API to become ready...'
       until curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; do
         sleep 2
       done
       echo '[smartify] Pulling qwen2.5-vl:7b-instruct (first run ~5 GB download)...'
       ollama pull qwen2.5-vl:7b-instruct
       echo '[smartify] Model ready — Ollama is serving.'
       wait $$SERVE_PID"
    healthcheck:
      # Only marked healthy once the model is actually present and serving
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q 'qwen2.5-vl'"]
      interval: 15s
      timeout: 10s
      start_period: 600s    # Allow 10 min for initial model download on slow connections
      retries: 40
    restart: unless-stopped

    # ── Optional: NVIDIA GPU acceleration ──────────────────────────────────
    # Requires: nvidia-container-toolkit installed on Docker host
    # Uncomment to enable:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Streamlit application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartify-app
    ports:
      - "8501:8501"         # Open http://localhost:8501 in browser
    environment:
      # Docker internal DNS: use service name "ollama" instead of localhost
      - OLLAMA_API_BASE=http://ollama:11434/v1
      - OLLAMA_MODEL=qwen2.5-vl:7b-instruct
    depends_on:
      ollama:
        condition: service_healthy   # App starts ONLY after model is downloaded + ready
    restart: unless-stopped

volumes:
  smartify_ollama_models:
    name: smartify_ollama_models    # Explicitly named for easy docker volume inspect
